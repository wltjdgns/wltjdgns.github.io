name: Sync Notion Content

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: notion-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Notion content
        run: node scripts/fetch-notion.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ARTICLES_DB_ID: 3669d6f800b480eca917cc15efc250e1
          NOTION_BIO_PAGE_ID: 3669d6f800b480e1be6af3e67e61cded
          NOTION_PROJECTS_DB_ID: 3669d6f800b480e19dc4fe4996ce1b14

      - name: Encrypt lab journal
        run: node scripts/encrypt-lab.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_LAB_DB_ID: ${{ secrets.NOTION_LAB_DB_ID }}
          LAB_PASSWORD: ${{ secrets.LAB_PASSWORD }}

      - name: Commit if changed
        run: |
          git config user.name "notion-sync[bot]"
          git config user.email "action@github.com"
          git add data/content.json data/lab-encrypted.json articles/ lab/
          if ! git diff --staged --quiet; then
            git commit -m "sync: update content from Notion"
            git push origin main
          fi
