<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="naver-site-verification" content="22001d3d0882ef11b539cc93f9620b067e5a0336" />
    <title>wltjdgns | 익스플로러의 기록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=IBM+Plex+Sans+KR:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card-bg: #121212; --text: #f0f0f0; --accent: #00d1ff; --secondary: #ff4d4d; --gray: #666666; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', 'IBM Plex Sans KR', sans-serif; line-height: 1.7; word-break: keep-all; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
        nav { padding: 2rem 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; margin-bottom: 4rem; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }
        .nav-links a { color: var(--gray); text-decoration: none; margin-left: 2rem; font-size: 0.9rem; transition: color 0.3s; }
        .nav-links a:hover { color: var(--text); }
        header { margin-bottom: 6rem; }
        .bio-label { display: inline-block; padding: 0.2rem 0.8rem; background: #222; border-radius: 4px; font-size: 0.75rem; color: var(--accent); margin-bottom: 1.5rem; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; line-height: 1.1; margin-bottom: 2rem; letter-spacing: -2px; }
        .hero-title span { background: linear-gradient(90deg, var(--accent), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bio-text { font-size: 1.2rem; font-weight: 300; color: #aaa; max-width: 700px; margin-bottom: 2rem; }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 0.8rem 1.6rem; border-radius: 8px; text-decoration: none; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary { border: 1px solid var(--gray); color: var(--text); }
        .btn-secondary:hover { border-color: var(--text); }
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gray); margin-bottom: 2rem; border-left: 3px solid var(--accent); padding-left: 1rem; }

        /* ── Article Filter ── */
        .tag-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .tag-filter-btn { padding: 0.35rem 0.9rem; border-radius: 20px; border: 1px solid #333; background: none; color: var(--gray); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .tag-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tag-filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 0.5rem; margin-bottom: 6rem; }
        .article-item { display: flex; flex-direction: column; gap: 0.4rem; text-decoration: none; color: inherit; padding: 1.5rem; border-radius: 12px; transition: background 0.3s; }
        .article-item:hover { background: var(--card-bg); }
        .article-date { font-size: 0.8rem; color: var(--gray); font-family: 'Inter'; }
        .article-title { font-size: 1.3rem; font-weight: 600; }
        .article-desc { color: #888; font-size: 0.95rem; font-weight: 300; }
        .article-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }
        .article-tag { font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 10px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }
        .empty-msg { color: #444; font-size: 0.9rem; padding: 1.5rem; }

        /* ── Project Grid ── */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 6rem; }
        .project-card { background: var(--card-bg); padding: 1.8rem; border-radius: 16px; border: 1px solid #222; display: flex; flex-direction: column; gap: 0.8rem; transition: border-color 0.3s; }
        .project-card:hover { border-color: #444; }
        .project-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .status-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 10px; font-weight: 600; white-space: nowrap; }
        .status-live { background: rgba(0, 255, 128, 0.12); color: #00ff80; border: 1px solid rgba(0, 255, 128, 0.2); }
        .status-dev { background: rgba(255, 200, 0, 0.12); color: #ffc800; border: 1px solid rgba(255, 200, 0, 0.2); }
        .status-soon { background: rgba(150, 150, 150, 0.1); color: #888; border: 1px solid #333; }
        .project-name { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }
        .project-desc { color: #888; font-size: 0.88rem; font-weight: 300; line-height: 1.6; flex: 1; }
        .project-stack { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .stack-tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; background: #1e1e1e; color: #666; border: 1px solid #2a2a2a; font-family: 'Inter'; }
        .btn-mini { align-self: flex-start; padding: 0.5rem 1rem; background: var(--text); color: var(--bg); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 0.82rem; transition: opacity 0.2s; margin-top: 0.4rem; }
        .btn-mini:hover { opacity: 0.8; }
        .btn-mini-ghost { align-self: flex-start; padding: 0.5rem 1rem; background: none; color: #555; border: 1px solid #2a2a2a; border-radius: 8px; font-weight: 600; font-size: 0.82rem; margin-top: 0.4rem; cursor: default; }

        /* ── About Section ── */
        .about-section { margin-bottom: 6rem; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .about-card { background: var(--card-bg); border: 1px solid #222; border-radius: 14px; padding: 1.6rem; }
        .about-card-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 1rem; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .chip { padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.82rem; background: #1a1a1a; border: 1px solid #2e2e2e; color: #ccc; }
        .now-item { display: flex; flex-direction: column; gap: 0.3rem; padding: 0.6rem 0; border-bottom: 1px solid #1e1e1e; }
        .now-item:last-child { border-bottom: none; }
        .now-item-label { font-size: 0.72rem; color: var(--gray); }
        .now-item-value { font-size: 0.9rem; color: var(--text); font-weight: 300; }
        .edu-item { padding: 0.7rem 0; border-bottom: 1px solid #1e1e1e; }
        .edu-item:last-child { border-bottom: none; }
        .edu-item-title { font-size: 0.9rem; color: var(--text); font-weight: 400; }
        .edu-item-period { font-size: 0.75rem; color: var(--gray); margin-top: 0.15rem; font-family: 'Inter'; }
        .about-bottom { margin-top: 1rem; background: var(--card-bg); border: 1px solid #222; border-radius: 14px; padding: 1.6rem; display: flex; justify-content: space-between; align-items: center; gap: 2rem; }
        .about-principle { font-size: 0.9rem; color: #888; font-weight: 300; max-width: 600px; }

        footer { padding: 4rem 0; border-top: 1px solid #222; color: #444; font-size: 0.8rem; display: flex; justify-content: space-between; }

        @media (max-width: 600px) {
            .about-grid { grid-template-columns: 1fr; }
            .project-grid { grid-template-columns: 1fr; }
            .about-bottom { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">WLTJDGNS.LOG</div>
            <div class="nav-links">
                <a href="#articles">Articles</a>
                <a href="#projects">Projects</a>
                <a href="#about">About</a>
                <a href="/lab/">Lab 🔒</a>
            </div>
        </nav>

        <header id="bio">
            <span class="bio-label">Explorer & Developer</span>
            <p class="bio-text">독수리타법 컴퓨터 공학도</p>
            <div class="btn-group">
                <a href="https://wltjdgns.github.io/appleapple/" class="btn btn-primary">사과게임 플레이</a>
                <a href="https://github.com/wltjdgns" class="btn btn-secondary">GitHub 방문</a>
            </div>
        </header>

        <!-- ── Articles ── -->
        <section id="articles">
            <h2 class="section-title">Recent Articles</h2>
            <div class="tag-filters">
                <button class="tag-filter-btn active" data-tag="all">All</button>
                <button class="tag-filter-btn" data-tag="게임개발">게임개발</button>
                <button class="tag-filter-btn" data-tag="백엔드">백엔드</button>
                <button class="tag-filter-btn" data-tag="회고">회고</button>
                <button class="tag-filter-btn" data-tag="ML">ML</button>
            </div>
            <div class="grid" id="articles-grid"></div>
        </section>

        <!-- ── Projects ── -->
        <section id="projects">
            <h2 class="section-title">Projects</h2>
            <div class="project-grid" id="projects-grid"></div>
        </section>

        <!-- ── About ── -->
        <section id="about" class="about-section">
            <h2 class="section-title">About</h2>
            <div class="about-grid">
                <div class="about-card">
                    <p class="about-card-label">관심 분야</p>
                    <div class="chip-group" id="chip-group"></div>
                </div>
                <div class="about-card">
                    <p class="about-card-label">지금 하는 것</p>
                    <div id="now-container"></div>
                </div>
            </div>
            <div class="about-card" id="edu-card" style="margin-top:1rem;display:none;">
                <p class="about-card-label">Education</p>
                <div id="edu-container"></div>
            </div>
            <div class="about-bottom">
                <p class="about-principle" id="about-principle"></p>
                <a href="https://github.com/wltjdgns" class="btn btn-secondary" style="white-space: nowrap;">GitHub →</a>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 wltjdgns. Recorded with curiosity.</p>
            <p><a href="https://github.com/wltjdgns" style="color: inherit; text-decoration: none;">GitHub</a></p>
        </footer>
    </div>

    <script>
        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        function formatDate(d) {
            if (!d) return '';
            const [y, m, day] = d.split('-');
            return `${y}. ${parseInt(m)}. ${parseInt(day)}`;
        }

        function bindFilters() {
            const btns = document.querySelectorAll('.tag-filter-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', function () {
                    btns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tag = this.dataset.tag;
                    document.querySelectorAll('.article-item').forEach(item => {
                        item.style.display = (tag === 'all' || item.dataset.tags.includes(tag)) ? 'flex' : 'none';
                    });
                });
            });
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articles-grid');
            if (!articles || articles.length === 0) {
                grid.innerHTML = '<p class="empty-msg">아직 작성된 글이 없습니다.</p>';
                return;
            }
            grid.innerHTML = articles.map(a => `
                <a href="${esc(a.url)}" class="article-item" data-tags="${esc(a.tags.join(' '))}">
                    <span class="article-date">${esc(formatDate(a.date))}</span>
                    <h3 class="article-title">${esc(a.title)}</h3>
                    <p class="article-desc">${esc(a.description)}</p>
                    <div class="article-tags">${a.tags.map(t => `<span class="article-tag">#${esc(t)}</span>`).join('')}</div>
                </a>
            `).join('');
            bindFilters();
        }

        function renderProjects(projects) {
            const grid = document.getElementById('projects-grid');
            if (!projects || projects.length === 0) {
                grid.innerHTML = '<p class="empty-msg">아직 등록된 프로젝트가 없습니다.</p>';
                return;
            }
            const statusMap = {
                'Live':   { cls: 'status-live', label: '● Live' },
                '개발중': { cls: 'status-dev',  label: '⚙ 개발중' },
                '예정':   { cls: 'status-soon', label: '📅 예정' }
            };
            grid.innerHTML = projects.map(p => {
                const s = statusMap[p.status] || statusMap['예정'];
                const btn = p.url
                    ? `<a href="${esc(p.url)}" class="btn-mini" target="_blank" rel="noopener">열기 →</a>`
                    : `<span class="btn-mini-ghost">${esc(p.status)}</span>`;
                return `<div class="project-card">
                    <div class="project-card-header">
                        <span class="project-name">${esc(p.name)}</span>
                        <span class="status-badge ${s.cls}">${s.label}</span>
                    </div>
                    <p class="project-desc">${esc(p.description)}</p>
                    <div class="project-stack">${p.stack.map(t => `<span class="stack-tag">${esc(t)}</span>`).join('')}</div>
                    ${btn}
                </div>`;
            }).join('');
        }

        function renderBio(bio) {
            if (!bio) return;

            // 관심 분야
            const interests = bio['관심 분야'] || [];
            if (interests.length) {
                document.getElementById('chip-group').innerHTML =
                    interests.map(i => `<span class="chip">${esc(i)}</span>`).join('');
            }

            // 지금 하는 것 — "(라벨) 내용" 형식 파싱
            const nowItems = bio['지금 하는 것'] || [];
            if (nowItems.length) {
                document.getElementById('now-container').innerHTML = nowItems.map(item => {
                    const match = item.match(/^\((.+?)\)\s*(.+)/);
                    const label = match ? match[1] : '현재';
                    const value = match ? match[2] : item;
                    return `<div class="now-item">
                        <span class="now-item-label">${esc(label)}</span>
                        <span class="now-item-value">${esc(value)}</span>
                    </div>`;
                }).join('');
            }

            // 학력 — "학력" 또는 "Education" 헤딩 둘 다 지원
            const edu = bio['학력'] || bio['Education'] || [];
            if (edu.length) {
                const card = document.getElementById('edu-card');
                card.style.display = 'block';
                document.getElementById('edu-container').innerHTML = edu.map(item => {
                    // "(2025~)" 또는 "(2019~2024)" 형식의 연도 파싱
                    const match = item.match(/^(.+?)\s*\((\d{4}[^)]*)\)\s*$/);
                    const title = match ? match[1].trim() : item;
                    const period = match ? match[2] : '';
                    return `<div class="edu-item">
                        <div class="edu-item-title">${esc(title)}</div>
                        ${period ? `<div class="edu-item-period">${esc(period)}</div>` : ''}
                    </div>`;
                }).join('');
            }

            // 소개
            const intro = bio['소개'] || [];
            if (intro.length) {
                document.getElementById('about-principle').textContent = intro.join(' ');
            }
        }

        async function loadContent() {
            try {
                const res = await fetch('data/content.json?t=' + Date.now());
                if (!res.ok) throw new Error('not found');
                const data = await res.json();
                renderArticles(data.articles);
                renderProjects(data.projects);
                renderBio(data.bio);
            } catch (e) {
                console.warn('content.json 로드 실패:', e.message);
                bindFilters();
            }
        }

        loadContent();
    </script>
</body>
</html>
