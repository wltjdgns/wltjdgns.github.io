<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연구기록 | wltjdgns</title>
  <script>(function(){var t=localStorage.getItem("theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=IBM+Plex+Sans+KR:wght@200;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false}]})"></script>
  <style>
    :root {
      --bg: #050505; --card-bg: #121212; --text: #f0f0f0; --accent: #00d1ff; --secondary: #ff4d4d; --gray: #666;
      --border: #222; --border-mid: #333; --border-subtle: #1e1e1e;
      --surface: #1a1a1a; --surface-mid: #161616;
      --muted: #888; --muted-text: #aaa; --muted-dark: #444;
      --content-text: #ccc; --text-soft: #ddd; --input-text: #555;
      --code-bg: #0e0e0e; --callout-bg: #111;
    }
    [data-theme="light"] {
      --bg: #f8f9fa; --card-bg: #ffffff; --text: #111111; --accent: #0088aa; --secondary: #cc2222; --gray: #888888;
      --border: #e0e0e0; --border-mid: #cccccc; --border-subtle: #eeeeee;
      --surface: #f0f0f0; --surface-mid: #f5f5f5;
      --muted: #666666; --muted-text: #777777; --muted-dark: #999999;
      --content-text: #333333; --text-soft: #222222; --input-text: #444444;
      --code-bg: #f5f5f5; --callout-bg: #f0f4f8;
    }
    .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 1rem; transition: all 0.3s; margin-left: auto; }
    .theme-toggle:hover { border-color: var(--accent); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', 'IBM Plex Sans KR', sans-serif; line-height: 1.8; word-break: keep-all; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 3rem; }
    nav { padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 4rem; display: flex; gap: 2rem; align-items: center; justify-content: space-between; }
    nav a { color: var(--gray); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1.5rem; text-align: center; }
    .lock-icon { font-size: 3rem; }
    .lock-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .lock-sub { color: var(--gray); font-size: 0.9rem; }
    .pw-form { display: flex; gap: 0.5rem; }
    #pw-input { background: var(--card-bg); border: 1px solid var(--border-mid); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1rem; padding: 0.75rem 1.2rem; outline: none; transition: border-color 0.2s; width: 260px; }
    #pw-input:focus { border-color: var(--accent); }
    #pw-input.error { border-color: var(--secondary); animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .btn-unlock { background: var(--accent); color: var(--bg); border: none; padding: 0.75rem 1.4rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; font-family: inherit; }
    .btn-unlock:hover { opacity: 0.85; }
    .btn-unlock:disabled { opacity: 0.5; cursor: not-allowed; }
    #lock-error { color: var(--secondary); font-size: 0.85rem; min-height: 1.2em; }
    #article-content { display: none; }
    header { margin-bottom: 3rem; }
    .meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .date { font-size: 0.82rem; color: var(--gray); font-family: 'Inter'; }
    .tag { font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 10px; background: var(--surface); color: var(--muted); border: 1px solid #2a2a2a; }
    h1.article-title { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; line-height: 1.2; letter-spacing: -1.5px; margin-bottom: 1rem; }
    .divider { height: 1px; background: var(--border-subtle); margin: 3rem 0; }
    .content p { margin-bottom: 1.4rem; color: var(--content-text); font-weight: 300; }
    .content h1 { font-size: 1.8rem; font-weight: 700; margin: 2.5rem 0 1rem; letter-spacing: -1px; }
    .content h2 { font-size: 1.4rem; font-weight: 700; margin: 2rem 0 0.8rem; border-left: 3px solid var(--accent); padding-left: 0.8rem; }
    .content h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.6rem; color: var(--text-soft); }
    .content ul, .content ol { margin: 0 0 1.4rem 1.5rem; color: var(--content-text); }
    .content li { margin-bottom: 0.4rem; font-weight: 300; }
    .content pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.4rem; overflow-x: auto; margin-bottom: 1.4rem; }
    .content code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.88rem; color: var(--accent); }
    .content pre code { color: var(--text-soft); }
    .content blockquote { border-left: 3px solid #333; padding-left: 1.2rem; color: var(--muted); font-style: italic; margin-bottom: 1.4rem; }
    .content hr { border: none; border-top: 1px solid var(--border-subtle); margin: 2rem 0; }
    .content figure { margin-bottom: 1.4rem; }
    .content img { max-width: 100%; border-radius: 10px; }
    .content figcaption { font-size: 0.8rem; color: var(--gray); text-align: center; margin-top: 0.5rem; }
    .content a { color: var(--accent); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content strong { font-weight: 700; color: var(--text); }
    .content .callout { background: var(--callout-bg); border: 1px solid #2a2a2a; border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 1.4rem; color: var(--content-text); }
    .content .db-title { font-weight: 600; color: var(--text-soft); margin-bottom: 0.5rem; font-size: 0.95rem; }
    .content .n-select, .content .n-status { display:inline-block; border-radius:3px; padding:1px 6px; font-size:0.78em; font-weight:500; white-space:nowrap; line-height:1.6; }
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 1.4rem; font-size: 0.9rem; }
    .content th, .content td { border: 1px solid #2a2a2a; padding: 0.6rem 0.8rem; text-align: left; }
    .content th { background: var(--surface); font-weight: 600; color: var(--text); }
    .content td { color: var(--content-text); }
    .content details.toggle-heading { margin-bottom: 1rem; }
    .content details.toggle-heading summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 0.5rem; }
    .content details.toggle-heading summary::before { content: '▶'; font-size: 0.65rem; color: var(--accent); transition: transform 0.2s; flex-shrink: 0; }
    .content details.toggle-heading[open] summary::before { transform: rotate(90deg); }
    .content details.toggle-heading summary h1,
    .content details.toggle-heading summary h2,
    .content details.toggle-heading summary h3 { margin: 0; display: inline; }
    .content details.toggle-heading .toggle-content { padding-left: 1.2rem; border-left: 2px solid #2a2a2a; margin-top: 0.5rem; }
    .content details.child-page { border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .content details.child-page summary { padding: 0.8rem 1rem; cursor: pointer; font-weight: 500; color: var(--text-soft); list-style: none; display: flex; align-items: center; gap: 0.5rem; }
    .content details.child-page summary::before { content: '▶'; font-size: 0.65rem; color: var(--accent); transition: transform 0.2s; flex-shrink: 0; }
    .content details.child-page[open] summary::before { transform: rotate(90deg); }
    .content details.child-page summary:hover { background: var(--callout-bg); }
    .content .child-page-content { padding: 0.2rem 1rem 0.8rem 2rem; border-top: 1px solid var(--border-subtle); }
    .content .column-list { display: flex; gap: 1.5rem; margin-bottom: 1.4rem; }
    .content .column { flex: 1; min-width: 0; }
    .content .math-block { overflow-x: auto; margin-bottom: 1.4rem; }
    @media (max-width: 640px) {
        .container { padding: 0 1.2rem; }
        .content .column-list { flex-direction: column; }
        footer { flex-direction: column; gap: 0.5rem; }
    }
    @media (max-width: 480px) {
        .pw-form { flex-direction: column; align-items: stretch; }
        #pw-input { width: 100%; }
    }
    @media (min-width: 1600px) {
        .container { max-width: 1000px; padding: 0 4rem; }
    }
    footer { padding: 4rem 0; border-top: 1px solid var(--border); color: var(--muted-dark); font-size: 0.8rem; margin-top: 4rem; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/">← WLTJDGNS.LOG</a>
      <a href="/lab/">연구기록</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="테마 변경">☀️</button>
    </nav>

    <div id="lock-screen">
      <div class="lock-icon">🔒</div>
      <h1 class="lock-title">연구기록</h1>
      <p class="lock-sub">비공개 영역입니다. 비밀번호를 입력하세요.</p>
      <div class="pw-form">
        <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
        <button class="btn-unlock" id="btn-unlock" onclick="unlock()">열기</button>
      </div>
      <p id="lock-error"></p>
    </div>

    <div id="article-content">
      <header>
        <div class="meta">
          <span class="date" id="entry-date"></span>
          <div id="entry-tags"></div>
        </div>
        <h1 class="article-title" id="entry-title"></h1>
      </header>
      <div class="divider"></div>
      <div class="content" id="entry-body"></div>
    </div>

    <footer><p>&copy; 2026 wltjdgns. Recorded with curiosity.</p></footer>
  </div>

  <script>
    var ENCRYPTED = {"salt":"ea46d9d53ccfe7044b5425c8070db7e28b20241be563794c004c3d2a42c9bc08","iv":"2772bd0536226d5bb328f156","data":"7037b145d358e5dbc87efc9a19befbb860c4d87236739a908cdacd5a7b1a46ff9830448ac4cccfb8e67a9931beb688445ecc550731e7b67d5aa5419f1e8782544d888d127fe1808fc4","tag":"ae55b9878b6f3748067178a75502783a"};

    function hexToBytes(hex) {
      var arr = new Uint8Array(hex.length / 2);
      for (var i = 0; i < hex.length; i += 2) arr[i / 2] = parseInt(hex.slice(i, i + 2), 16);
      return arr;
    }

    function deriveKey(password, salt) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"])
        .then(function(km) {
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            km,
            { name: "AES-GCM", length: 256 },
            false, ["decrypt"]
          );
        });
    }

    function decryptData(encObj, password) {
      var salt = hexToBytes(encObj.salt);
      var iv = hexToBytes(encObj.iv);
      var data = hexToBytes(encObj.data);
      var tag = hexToBytes(encObj.tag);
      var combined = new Uint8Array(data.length + tag.length);
      combined.set(data); combined.set(tag, data.length);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, combined);
      }).then(function(dec) {
        return new TextDecoder().decode(dec);
      });
    }

    function formatDate(d) {
      if (!d) return "";
      var parts = d.split("-");
      return parts[0] + ". " + parseInt(parts[1]) + ". " + parseInt(parts[2]);
    }

    function renderEntry(entry) {
      document.getElementById("entry-date").textContent = formatDate(entry.date);
      document.getElementById("entry-tags").innerHTML = entry.tags.map(function(t) { return '<span class="tag">#' + t + "</span>"; }).join("");
      document.getElementById("entry-title").textContent = entry.title;
      document.getElementById("entry-body").innerHTML = entry.contentHtml || '<p style="color:#555">내용이 없습니다.</p>';
      document.getElementById("lock-screen").style.display = "none";
      document.getElementById("article-content").style.display = "block";
    }

    function unlock() {
      var pw = document.getElementById("pw-input").value;
      var errEl = document.getElementById("lock-error");
      var btn = document.getElementById("btn-unlock");
      var input = document.getElementById("pw-input");
      if (!pw) return;
      btn.disabled = true;
      btn.textContent = "복호화 중...";
      errEl.textContent = "";
      input.classList.remove("error");
      decryptData(ENCRYPTED, pw).then(function(plaintext) {
        var entry = JSON.parse(plaintext);
        renderEntry(entry);
        sessionStorage.setItem("lab_pw", pw);
      }).catch(function() {
        input.classList.add("error");
        errEl.textContent = "비밀번호가 올바르지 않습니다.";
        btn.disabled = false;
        btn.textContent = "열기";
        input.value = "";
        input.focus();
      });
    }

    document.getElementById("pw-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") unlock();
    });

    var saved = sessionStorage.getItem("lab_pw");
    if (saved) { document.getElementById("pw-input").value = saved; unlock(); }
  </script>
  <script>
    (function() {
      var tt = document.getElementById('theme-toggle');
      if (!tt) return;
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        tt.textContent = t === 'light' ? '🌙' : '☀️';
      }
      var saved = localStorage.getItem('theme') || 'dark';
      tt.textContent = saved === 'light' ? '🌙' : '☀️';
      tt.addEventListener('click', function() {
        var cur = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(cur === 'light' ? 'dark' : 'light');
      });
    })();
  </script>
</body>
</html>
