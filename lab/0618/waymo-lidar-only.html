  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', 'IBM Plex Sans KR', sans-serif; line-height: 1.8; word-break: keep-all; transition: background-color 0.3s, color 0.3s; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 3rem; }

    .nav-right { display: flex; align-items: center; }
    .nav-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; padding: 0.2rem 0.4rem; line-height: 1; }
    .nav-links a { color: var(--gray); text-decoration: none; margin-left: 2rem; font-size: 0.9rem; transition: color 0.3s; }
    .nav-links a:hover { color: var(--text); }

    .lock-icon { font-size: 3rem; }
    .lock-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .lock-sub { color: var(--gray); font-size: 0.9rem; }
    .pw-form { display: flex; gap: 0.5rem; }
    #pw-input { background: var(--card-bg); border: 1px solid var(--border-mid); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1rem; padding: 0.75rem 1.2rem; outline: none; transition: border-color 0.2s; width: 260px; }
    #pw-input:focus { border-color: var(--accent); }
    #pw-input.error { border-color: var(--secondary); animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .btn-unlock { background: var(--accent); color: var(--bg); border: none; padding: 0.75rem 1.4rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; font-family: inherit; }
    .btn-unlock:hover { opacity: 0.85; }
    .btn-unlock:disabled { opacity: 0.5; cursor: not-allowed; }
    #lock-error { color: var(--secondary); font-size: 0.85rem; min-height: 1.2em; }
    #article-content { display: none; }
    header { margin-bottom: 3rem; }
    .meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .date { font-size: 0.82rem; color: var(--gray); font-family: 'Inter'; }
    .tag { font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 10px; background: var(--surface); color: var(--muted); border: 1px solid var(--border-mid); }
    h1.article-title { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; line-height: 1.2; letter-spacing: -1.5px; margin-bottom: 1rem; }
    .divider { height: 1px; background: var(--border-subtle); margin: 3rem 0; }
    .content p { margin-bottom: 1.4rem; color: var(--content-text); font-weight: 300; }
    .content h1 { font-size: 1.8rem; font-weight: 700; margin: 2.5rem 0 1rem; letter-spacing: -1px; }
    .content h2 { font-size: 1.4rem; font-weight: 700; margin: 2rem 0 0.8rem; border-left: 3px solid var(--accent); padding-left: 0.8rem; }
    .content h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.6rem; color: var(--text-soft); }
    .content ul, .content ol { margin: 0 0 1.4rem 1.5rem; color: var(--content-text); }
    .content li { margin-bottom: 0.4rem; font-weight: 300; }
    .content pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.4rem; overflow-x: auto; margin-bottom: 1.4rem; }
    .content code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.88rem; color: var(--accent); }

    .content a:hover { text-decoration: underline; }
    .content strong { font-weight: 700; color: var(--text); }

    .content table { width: 100%; border-collapse: collapse; margin-bottom: 1.4rem; font-size: 0.9rem; }
    .content th, .content td { border: 1px solid var(--border-mid); padding: 0.6rem 0.8rem; text-align: left; vertical-align: middle; }
    .content th { background: var(--surface); font-weight: 600; color: var(--text); }
    .content td { color: var(--content-text); }
    .content details { border: 1px solid var(--border-mid); border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .content details summary { padding: 0.8rem 1rem; cursor: pointer; font-weight: 500; color: var(--text-soft); list-style: none; display: flex; align-items: center; gap: 0.5rem; }
    .content details summary::-webkit-details-marker { display: none; }
    .content details summary::before { content: "\25B6"; font-size: 0.65rem; color: var(--accent); transition: transform 0.2s; flex-shrink: 0; }
    .content details[open] summary::before { transform: rotate(90deg); }
    .content details summary:hover { background: var(--summary-hover); }
    .content .toggle-content { padding: 0.2rem 1rem 0.8rem 2rem; border-top: 1px solid var(--border-subtle); }
    .content details.toggle-heading summary h1, .content details.toggle-heading summary h2, .content details.toggle-heading summary h3 { margin: 0; display: inline; }
    .content .column-list { display: flex; gap: 1.5rem; margin-bottom: 1.4rem; }
    .content .column { flex: 1; min-width: 0; }
    .content .math-block { overflow-x: auto; margin-bottom: 1.4rem; }
    .content .db-title { font-weight: 700; font-size: 1rem; color: var(--accent); margin: 2rem 0 0.6rem; display: flex; align-items: center; gap: 0.4rem; }
    .content .db-container { margin-bottom: 1.4rem; }
    .content .db-toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
    .content .db-filter-input { background: var(--card-bg); border: 1px solid var(--border-mid); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.85rem; padding: 0.4rem 0.8rem; outline: none; transition: border-color 0.2s; width: 240px; }
    .content .db-filter-input:focus { border-color: var(--accent); }

    .content .db-table-wrap { overflow-x: auto; }

    .content .db-table th, .content .db-table td { border: 1px solid var(--border-mid); padding: 0.5rem 0.8rem; text-align: left; vertical-align: top; white-space: normal; word-break: normal; overflow-wrap: anywhere; }
    .content .db-table td a { word-break: break-all; }
    .content .db-table th { background: var(--surface-mid); font-weight: 600; color: var(--muted-text); font-size: 0.78rem; letter-spacing: 0.03em; cursor: pointer; user-select: none; white-space: nowrap; }

    function hexToBytes(hex) {
      var arr = new Uint8Array(hex.length / 2);
      for (var i = 0; i < hex.length; i += 2) arr[i / 2] = parseInt(hex.slice(i, i + 2), 16);
      return arr;
    }

    function deriveKey(password, salt) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"])
        .then(function(km) {
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            km,
            { name: "AES-GCM", length: 256 },
            false, ["decrypt"]
          );
        });
    }

    function decryptData(encObj, password) {
      var salt = hexToBytes(encObj.salt);
      var iv = hexToBytes(encObj.iv);
      var data = hexToBytes(encObj.data);
      var tag = hexToBytes(encObj.tag);
      var combined = new Uint8Array(data.length + tag.length);
      combined.set(data); combined.set(tag, data.length);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, combined);
      }).then(function(dec) {
        return new TextDecoder().decode(dec);
      });
    }

    function formatDate(d) {
      if (!d) return "";
      var parts = d.split("-");
      return parts[0] + ". " + parseInt(parts[1]) + ". " + parseInt(parts[2]);
    }

    function initDbTables() {
      document.querySelectorAll(".db-container").forEach(function(container) {
        var scrollTop = container.querySelector(".db-scroll-top");
        var scrollSpacer = container.querySelector(".db-scroll-spacer");
        var tableWrap = container.querySelector(".db-table-wrap");
        var table = container.querySelector(".db-table");
        var filterInput = container.querySelector(".db-filter-input");
        var rowCount = container.querySelector(".db-row-count");
        if (!scrollTop || !tableWrap || !table) return;
        /* sync top scrollbar width */
        function syncWidth() { scrollSpacer.style.width = tableWrap.scrollWidth + "px"; }
        setTimeout(syncWidth, 0);
        var ro = window.ResizeObserver ? new ResizeObserver(syncWidth) : null;
        if (ro) ro.observe(table);
        var syncing = false;
        scrollTop.addEventListener("scroll", function() { if (syncing) return; syncing = true; tableWrap.scrollLeft = scrollTop.scrollLeft; requestAnimationFrame(function() { syncing = false; }); });
        tableWrap.addEventListener("scroll", function() { if (syncing) return; syncing = true; scrollTop.scrollLeft = tableWrap.scrollLeft; requestAnimationFrame(function() { syncing = false; }); });
        /* sort */
        var ths = table.querySelectorAll("thead th");
        var tbody = table.querySelector("tbody");
        var totalRows = tbody ? tbody.querySelectorAll("tr").length : 0;
        ths.forEach(function(th) {
          th.addEventListener("click", function() {
            var col = parseInt(th.getAttribute("data-col"));
            var asc = !th.classList.contains("sort-asc");
            ths.forEach(function(h) { h.classList.remove("sort-asc", "sort-desc"); });
            th.classList.add(asc ? "sort-asc" : "sort-desc");
            var rows = Array.from(tbody.querySelectorAll("tr"));
            rows.sort(function(a, b) {
              var at = (a.children[col] ? a.children[col].textContent : "").trim().toLowerCase();
              var bt = (b.children[col] ? b.children[col].textContent : "").trim().toLowerCase();
              var an = parseFloat(at), bn = parseFloat(bt);
              if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
              return asc ? at.localeCompare(bt) : bt.localeCompare(at);
            });
            rows.forEach(function(r) { tbody.appendChild(r); });
          });
        });
        /* filter */
        if (filterInput) {
          filterInput.addEventListener("input", function() {
            var q = filterInput.value.toLowerCase();
            var visible = 0;
            tbody.querySelectorAll("tr").forEach(function(row) {
              var text = row.textContent.toLowerCase();
              var match = !q || text.indexOf(q) !== -1;
              row.classList.toggle("db-row-hidden", !match);
              if (match) visible++;
            });
            if (rowCount) rowCount.textContent = (q ? visible + "/" : "") + totalRows + "개 항목";
          });
        }
      });
    }

    function renderEntry(entry) {
      document.getElementById("entry-date").textContent = formatDate(entry.date);
      document.getElementById("entry-tags").innerHTML = (entry.tags || []).map(function(t) { return '<span class="tag">#' + t + "</span>"; }).join("");
      document.getElementById("entry-title").textContent = entry.title || "";
      document.getElementById("entry-body").innerHTML = entry.contentHtml || '<p style="color:#555">내용이 없습니다.</p>';
      document.getElementById("lock-screen").style.display = "none";
      document.getElementById("article-content").style.display = "block";
      if (window.renderMathInElement) {
        renderMathInElement(document.getElementById("entry-body"), {
          delimiters: [{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}]
        });
      }
      initDbTables();
    }

    function unlock() {
      var pw = document.getElementById("pw-input").value;
      var errEl = document.getElementById("lock-error");
      var btn = document.getElementById("btn-unlock");
      var input = document.getElementById("pw-input");
      if (!pw) return;
      btn.disabled = true;
      btn.textContent = "복호화 중...";
      errEl.textContent = "";
      input.classList.remove("error");
      decryptData(ENCRYPTED, pw).then(function(plaintext) {
        var entry = JSON.parse(plaintext);
        renderEntry(entry);
        sessionStorage.setItem("lab_pw", pw);
      }).catch(function() {
        input.classList.add("error");
        errEl.textContent = "비밀번호가 올바르지 않습니다.";
        btn.disabled = false;
        btn.textContent = "열기";
        input.value = "";
        input.focus();
      });
    }

    document.getElementById("pw-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") unlock();
    });

    var saved = sessionStorage.getItem("lab_pw");
    if (saved) { document.getElementById("pw-input").value = saved; unlock(); }

      if (toggle && links) {
        toggle.addEventListener("click", function() {
          var isOpen = links.classList.toggle("open");
          toggle.setAttribute("aria-expanded", isOpen);
          toggle.textContent = isOpen ? "✕" : "☰";
        });
        links.querySelectorAll("a").forEach(function(a) {
          a.addEventListener("click", function() {
            links.classList.remove("open");
            toggle.setAttribute("aria-expanded", "false");
            toggle.textContent = "☰";
          });
        });
      }
    })();
  </script>
