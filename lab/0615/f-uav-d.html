  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <style>
    :root { --bg: #050505; --card-bg: #121212; --text: #f0f0f0; --accent: #00d1ff; --secondary: #ff4d4d; --gray: #666; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', 'IBM Plex Sans KR', sans-serif; line-height: 1.8; word-break: keep-all; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 3rem; }
    nav { padding: 2rem 0; border-bottom: 1px solid #222; margin-bottom: 4rem; display: flex; gap: 2rem; align-items: center; }
    nav a { color: var(--gray); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1.5rem; text-align: center; }
    .lock-icon { font-size: 3rem; }
    .lock-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .lock-sub { color: var(--gray); font-size: 0.9rem; }
    .pw-form { display: flex; gap: 0.5rem; }
    #pw-input { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1rem; padding: 0.75rem 1.2rem; outline: none; transition: border-color 0.2s; width: 260px; }
    #pw-input:focus { border-color: var(--accent); }
    #pw-input.error { border-color: var(--secondary); animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .btn-unlock { background: var(--accent); color: var(--bg); border: none; padding: 0.75rem 1.4rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; font-family: inherit; }
    .btn-unlock:hover { opacity: 0.85; }
    .btn-unlock:disabled { opacity: 0.5; cursor: not-allowed; }
    #lock-error { color: var(--secondary); font-size: 0.85rem; min-height: 1.2em; }
    #article-content { display: none; }
    header { margin-bottom: 3rem; }
    .meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .date { font-size: 0.82rem; color: var(--gray); font-family: 'Inter'; }
    .tag { font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 10px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }
    h1.article-title { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; line-height: 1.2; letter-spacing: -1.5px; margin-bottom: 1rem; }
    .divider { height: 1px; background: #1e1e1e; margin: 3rem 0; }
    .content p { margin-bottom: 1.4rem; color: #ccc; font-weight: 300; }
    .content h1 { font-size: 1.8rem; font-weight: 700; margin: 2.5rem 0 1rem; letter-spacing: -1px; }
    .content h2 { font-size: 1.4rem; font-weight: 700; margin: 2rem 0 0.8rem; border-left: 3px solid var(--accent); padding-left: 0.8rem; }
    .content h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.6rem; color: #ddd; }
    .content ul, .content ol { margin: 0 0 1.4rem 1.5rem; color: #ccc; }
    .content li { margin-bottom: 0.4rem; font-weight: 300; }
    .content pre { background: #0e0e0e; border: 1px solid #222; border-radius: 10px; padding: 1.4rem; overflow-x: auto; margin-bottom: 1.4rem; }
    .content code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.88rem; color: var(--accent); }
    .content pre code { color: #e0e0e0; }
    .content blockquote { border-left: 3px solid #333; padding-left: 1.2rem; color: #888; font-style: italic; margin-bottom: 1.4rem; }
    .content hr { border: none; border-top: 1px solid #1e1e1e; margin: 2rem 0; }
    .content figure { margin-bottom: 1.4rem; }
    .content img { max-width: 100%; border-radius: 10px; }
    .content figcaption { font-size: 0.8rem; color: var(--gray); text-align: center; margin-top: 0.5rem; }
    .content a { color: var(--accent); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content strong { font-weight: 700; color: var(--text); }
    .content .callout { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 1.4rem; color: #ccc; }
    .content table { width: 100%; border-collapse: collapse; margin-bottom: 1.4rem; font-size: 0.9rem; }
    .content th, .content td { border: 1px solid #2a2a2a; padding: 0.6rem 0.8rem; text-align: left; vertical-align: middle; }
    .content th { background: #1a1a1a; font-weight: 600; color: var(--text); }
    .content td { color: #ccc; }
    .content details { border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .content details summary { padding: 0.8rem 1rem; cursor: pointer; font-weight: 500; color: #ddd; list-style: none; display: flex; align-items: center; gap: 0.5rem; }
    .content details summary::-webkit-details-marker { display: none; }
    .content details summary::before { content: "\25B6"; font-size: 0.65rem; color: var(--accent); transition: transform 0.2s; flex-shrink: 0; }
    .content details[open] summary::before { transform: rotate(90deg); }
    .content details summary:hover { background: #111; }
    .content .toggle-content { padding: 0.2rem 1rem 0.8rem 2rem; border-top: 1px solid #1e1e1e; }
    .content details.toggle-heading summary h1, .content details.toggle-heading summary h2, .content details.toggle-heading summary h3 { margin: 0; display: inline; }
    .content .column-list { display: flex; gap: 1.5rem; margin-bottom: 1.4rem; }
    .content .column { flex: 1; min-width: 0; }
    .content .math-block { overflow-x: auto; margin-bottom: 1.4rem; }
    .content .db-title { font-weight: 700; font-size: 1rem; color: var(--accent); margin: 2rem 0 0.6rem; display: flex; align-items: center; gap: 0.4rem; }
    .content .db-table-wrap { overflow-x: auto; margin-bottom: 1.4rem; }
    .content .db-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .content .db-table th, .content .db-table td { border: 1px solid #2a2a2a; padding: 0.5rem 0.8rem; text-align: left; vertical-align: top; white-space: normal; }
    .content .db-table th { background: #161616; font-weight: 600; color: #aaa; font-size: 0.78rem; letter-spacing: 0.03em; }
    .content .db-table td { color: #ccc; }
    .content .db-table td:first-child { white-space: normal; }
    .content .n-select, .content .n-status { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 0.78em; font-weight: 500; white-space: nowrap; line-height: 1.6; }
    @media (max-width: 640px) {
        .container { padding: 0 1.2rem; }
        .content .column-list { flex-direction: column; }
        footer { flex-direction: column; gap: 0.5rem; }
    }
    @media (max-width: 480px) {
        .pw-form { flex-direction: column; align-items: stretch; }
        #pw-input { width: 100%; }
    }
    @media (min-width: 1600px) {
        .container { max-width: 1000px; padding: 0 4rem; }
    }
    footer { padding: 4rem 0; border-top: 1px solid #222; color: #444; font-size: 0.8rem; margin-top: 4rem; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/">← WLTJDGNS.LOG</a>
      <a href="/lab/">연구기록</a>
    </nav>

    <div id="lock-screen">
      <div class="lock-icon">🔒</div>
      <h1 class="lock-title">연구기록</h1>
      <p class="lock-sub">비공개 영역입니다. 비밀번호를 입력하세요.</p>
      <div class="pw-form">
        <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
        <button class="btn-unlock" id="btn-unlock" onclick="unlock()">열기</button>
      </div>
      <p id="lock-error"></p>
    </div>

    <div id="article-content">
      <header>
        <div class="meta">
          <span class="date" id="entry-date"></span>
          <div id="entry-tags"></div>
        </div>
        <h1 class="article-title" id="entry-title"></h1>
      </header>
      <div class="divider"></div>
      <div class="content" id="entry-body"></div>
    </div>

    <footer><p>&copy; 2026 wltjdgns. Recorded with curiosity.</p></footer>
  </div>

  <script>
    var ENCRYPTED = {"salt":"a26b2a237cf3bd8b09c6a6a854d5c0364798670f1d5b5a446ff5d2e3fa841b25","iv":"96ae33ed235d5b51f658b10d","data":"e4a042201e9b748f287d91d80c1e0ed69a7f3d1623825a9e921dbc8fef36254bbc0f7ec48a7e02cb23fa00c876eb016ea0f3641c169f3803fc74295a85a990e10deab0cd61db23609d3468879aa406071733ce92632bac339c40ce80fa3bd4edcc364e355025c6ac60ac4c89af18a1b3a8cfb4d8ffd2ddb0ad5ed5459a5e0c4ebb2a524923b5516d6c20628aaaf706735d50841ca648b078fa1331203a52a10864bf5a3b85f0042c1047734c290bda070107aaacc35c91c7a7746421a108d92f4da0d8a33ef7f8645affa46d68ef1c8c772ad15607ec1dd82e820c27222acfa6369858f58ab0d178a2a1aae9476d8924dd70b9b71e7a7bf9c98f01393ea9777598fc227553134c754bb2c5ab246496352c4a7542db335807fe99e2663b61c4d95b288f118e1beb8f088d6ed32df1a0575af32bdd089eef0c6dbafed886dc26e5d14f3bda78f9986bf6a34072128867976463f9c5ab6d0264091340c99335654c9c6489b9e1800ecfa6746656d8c256b5edf777145dfd58aebbb38f1020d42fcdcf680647dbb0569b0131a39effe5d14b9f24cdb162f6baa8d79783a88428f4f7856f7be4e6e34c88c7cd8228f10369539338b01d4763cdd646d4634341f0e0d7f50b0bbdfcfe38b86b6a811ba641c46780b8a9c62ba1ef7beedf077da8e1aa84d03dccf0a48413974aebb248c745f888a9e79c18d25e3badf8007591a869d468c64ea9f4c7bc3298289d8515","tag":"3d371da38672981316fe63f56c90e602"};

    function hexToBytes(hex) {
      var arr = new Uint8Array(hex.length / 2);
      for (var i = 0; i < hex.length; i += 2) arr[i / 2] = parseInt(hex.slice(i, i + 2), 16);
      return arr;
    }

    function deriveKey(password, salt) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"])
        .then(function(km) {
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            km,
            { name: "AES-GCM", length: 256 },
            false, ["decrypt"]
          );
        });
    }

    function decryptData(encObj, password) {
      var salt = hexToBytes(encObj.salt);
      var iv = hexToBytes(encObj.iv);
      var data = hexToBytes(encObj.data);
      var tag = hexToBytes(encObj.tag);
      var combined = new Uint8Array(data.length + tag.length);
      combined.set(data); combined.set(tag, data.length);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, combined);
      }).then(function(dec) {
        return new TextDecoder().decode(dec);
      });
    }

    function formatDate(d) {
      if (!d) return "";
      var parts = d.split("-");
      return parts[0] + ". " + parseInt(parts[1]) + ". " + parseInt(parts[2]);
    }

    function renderEntry(entry) {
      document.getElementById("entry-date").textContent = formatDate(entry.date);
      document.getElementById("entry-tags").innerHTML = (entry.tags || []).map(function(t) { return '<span class="tag">#' + t + "</span>"; }).join("");
      document.getElementById("entry-title").textContent = entry.title || "";
      document.getElementById("entry-body").innerHTML = entry.contentHtml || '<p style="color:#555">내용이 없습니다.</p>';
      document.getElementById("lock-screen").style.display = "none";
      document.getElementById("article-content").style.display = "block";
      if (window.renderMathInElement) {
        renderMathInElement(document.getElementById("entry-body"), {
          delimiters: [{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}]
        });
      }
    }

    function unlock() {
      var pw = document.getElementById("pw-input").value;
      var errEl = document.getElementById("lock-error");
      var btn = document.getElementById("btn-unlock");
      var input = document.getElementById("pw-input");
      if (!pw) return;
      btn.disabled = true;
      btn.textContent = "복호화 중...";
      errEl.textContent = "";
      input.classList.remove("error");
      decryptData(ENCRYPTED, pw).then(function(plaintext) {
        var entry = JSON.parse(plaintext);
        renderEntry(entry);
        sessionStorage.setItem("lab_pw", pw);
      }).catch(function() {
        input.classList.add("error");
        errEl.textContent = "비밀번호가 올바르지 않습니다.";
        btn.disabled = false;
        btn.textContent = "열기";
        input.value = "";
        input.focus();
      });
    }

    document.getElementById("pw-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") unlock();
    });

    var saved = sessionStorage.getItem("lab_pw");
    if (saved) { document.getElementById("pw-input").value = saved; unlock(); }
  </script>
</body>
</html>
