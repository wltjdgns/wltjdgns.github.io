<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연구기록 | wltjdgns</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=IBM+Plex+Sans+KR:wght@200;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #050505; --card-bg: #121212; --text: #f0f0f0; --accent: #00d1ff; --secondary: #ff4d4d; --gray: #666; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', 'IBM Plex Sans KR', sans-serif; line-height: 1.7; word-break: keep-all; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }

    nav { padding: 2rem 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; margin-bottom: 4rem; }
    .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; text-decoration: none; color: var(--text); }
    .nav-links a { color: var(--gray); text-decoration: none; margin-left: 2rem; font-size: 0.9rem; transition: color 0.3s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); }

    /* ── Lock Screen ── */
    #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1.5rem; text-align: center; }
    .lock-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .lock-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .lock-sub { color: var(--gray); font-size: 0.9rem; }
    .pw-form { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    #pw-input {
      background: var(--card-bg); border: 1px solid #333; border-radius: 8px;
      color: var(--text); font-family: inherit; font-size: 1rem;
      padding: 0.75rem 1.2rem; outline: none; transition: border-color 0.2s; width: 260px;
    }
    #pw-input:focus { border-color: var(--accent); }
    #pw-input.error { border-color: var(--secondary); animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .btn-unlock {
      background: var(--accent); color: var(--bg); border: none;
      padding: 0.75rem 1.4rem; border-radius: 8px; font-weight: 700;
      font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; font-family: inherit;
    }
    .btn-unlock:hover { opacity: 0.85; }
    .btn-unlock:disabled { opacity: 0.5; cursor: not-allowed; }
    #lock-error { color: var(--secondary); font-size: 0.85rem; min-height: 1.2em; }

    /* ── Lab Content ── */
    #lab-content { display: none; }
    .lab-header { margin-bottom: 3rem; }
    .lab-label { display: inline-block; padding: 0.2rem 0.8rem; background: #222; border-radius: 4px; font-size: 0.75rem; color: var(--accent); margin-bottom: 1rem; }
    .lab-title { font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; }
    .lab-count { color: var(--gray); font-size: 0.85rem; }
    .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gray); margin-bottom: 2rem; border-left: 3px solid var(--accent); padding-left: 1rem; }

    /* ── Entry List (articles 방식) ── */
    .grid { display: grid; grid-template-columns: 1fr; gap: 0.5rem; margin-bottom: 6rem; }
    .entry-item { display: flex; flex-direction: column; gap: 0.4rem; text-decoration: none; color: inherit; padding: 1.5rem; border-radius: 12px; transition: background 0.3s; }
    .entry-item:hover { background: var(--card-bg); }
    .entry-date { font-size: 0.8rem; color: var(--gray); font-family: 'Inter'; }
    .entry-title { font-size: 1.3rem; font-weight: 600; }
    .entry-desc { color: #888; font-size: 0.95rem; font-weight: 300; }
    .entry-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .entry-tag { font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 10px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; }
    .empty-msg { color: #444; font-size: 0.9rem; padding: 1.5rem; }

    footer { padding: 4rem 0; border-top: 1px solid #222; color: #444; font-size: 0.8rem; display: flex; justify-content: space-between; }

    @media (max-width: 600px) {
      .pw-form { flex-direction: column; align-items: stretch; }
      #pw-input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="logo">WLTJDGNS.LOG</a>
      <div class="nav-links">
        <a href="/#articles">Articles</a>
        <a href="/#projects">Projects</a>
        <a href="/#about">About</a>
        <a href="/lab/" class="active">Lab 🔒</a>
      </div>
    </nav>

    <!-- ── 잠금 화면 ── -->
    <div id="lock-screen">
      <div class="lock-icon">🔒</div>
      <h1 class="lock-title">연구기록</h1>
      <p class="lock-sub">비공개 영역입니다. 비밀번호를 입력하세요.</p>
      <div class="pw-form">
        <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
        <button class="btn-unlock" id="btn-unlock" onclick="unlock()">열기</button>
      </div>
      <p id="lock-error"></p>
    </div>

    <!-- ── 목록 (복호화 후 표시) ── -->
    <div id="lab-content">
      <div class="lab-header">
        <span class="lab-label">Private Lab</span>
        <h1 class="lab-title">연구기록</h1>
        <p class="lab-count" id="entry-count"></p>
      </div>
      <h2 class="section-title">All Entries</h2>
      <div class="grid" id="entries-grid"></div>
    </div>

    <footer>
      <p>&copy; 2026 wltjdgns. Recorded with curiosity.</p>
      <p><a href="https://github.com/wltjdgns" style="color:inherit;text-decoration:none;">GitHub</a></p>
    </footer>
  </div>

  <script>
    function hexToBytes(hex) {
      var arr = new Uint8Array(hex.length / 2);
      for (var i = 0; i < hex.length; i += 2) arr[i / 2] = parseInt(hex.slice(i, i + 2), 16);
      return arr;
    }

    function deriveKey(password, salt) {
      var enc = new TextEncoder();
      return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey'])
        .then(function(km) {
          return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
            km,
            { name: 'AES-GCM', length: 256 },
            false, ['decrypt']
          );
        });
    }

    function decryptData(encObj, password) {
      var salt = hexToBytes(encObj.salt);
      var iv = hexToBytes(encObj.iv);
      var data = hexToBytes(encObj.data);
      var tag = hexToBytes(encObj.tag);
      var combined = new Uint8Array(data.length + tag.length);
      combined.set(data); combined.set(tag, data.length);
      return deriveKey(password, salt).then(function(key) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, combined);
      }).then(function(dec) {
        return new TextDecoder().decode(dec);
      });
    }

    function formatDate(d) {
      if (!d) return '';
      var p = d.split('-');
      return p[0] + '. ' + parseInt(p[1]) + '. ' + parseInt(p[2]);
    }

    function renderEntries(entries) {
      var grid = document.getElementById('entries-grid');
      document.getElementById('entry-count').textContent = '총 ' + entries.length + '개의 기록';
      if (!entries.length) {
        grid.innerHTML = '<p class="empty-msg">아직 작성된 연구기록이 없습니다.</p>';
        return;
      }
      grid.innerHTML = entries.map(function(e) {
        var tags = e.tags.map(function(t) { return '<span class="entry-tag">#' + t + '</span>'; }).join('');
        return '<a href="' + e.url + '" class="entry-item">' +
          '<span class="entry-date">' + formatDate(e.date) + '</span>' +
          '<h3 class="entry-title">' + e.title + '</h3>' +
          (e.description ? '<p class="entry-desc">' + e.description + '</p>' : '') +
          (tags ? '<div class="entry-tags">' + tags + '</div>' : '') +
          '</a>';
      }).join('');
    }

    function unlock() {
      var pw = document.getElementById('pw-input').value;
      var errEl = document.getElementById('lock-error');
      var btn = document.getElementById('btn-unlock');
      var input = document.getElementById('pw-input');
      if (!pw) return;

      btn.disabled = true;
      btn.textContent = '복호화 중...';
      errEl.textContent = '';
      input.classList.remove('error');

      fetch('/data/lab-encrypted.json?t=' + Date.now())
        .then(function(res) {
          if (!res.ok) {
            errEl.textContent = '아직 연구기록이 설정되지 않았습니다. (GitHub Action 미실행)';
            btn.disabled = false;
            btn.textContent = '열기';
            throw new Error('skip');
          }
          return res.json();
        })
        .then(function(encObj) { return decryptData(encObj, pw); })
        .then(function(plaintext) {
          var entries = JSON.parse(plaintext);
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('lab-content').style.display = 'block';
          renderEntries(entries);
          sessionStorage.setItem('lab_pw', pw);
        })
        .catch(function(e) {
          if (e && e.message === 'skip') return;
          input.classList.add('error');
          errEl.textContent = '비밀번호가 올바르지 않습니다.';
          btn.disabled = false;
          btn.textContent = '열기';
          input.value = '';
          input.focus();
        });
    }

    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') unlock();
    });

    var saved = sessionStorage.getItem('lab_pw');
    if (saved) { document.getElementById('pw-input').value = saved; unlock(); }
  </script>
</body>
</html>
